<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-4xl mx-auto">

    <header class="bg-indigo-600 text-white rounded-2xl p-6 shadow-lg mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">💰 Wealth Tracker</h1>
            <p class="text-indigo-200 text-sm">Personal finance & spending dashboard</p>
        </div>
        <div class="text-right">
            <p class="text-xs text-indigo-200 uppercase tracking-wider">Net Worth</p>
            <p id="total-balance" class="text-3xl font-extrabold">₹0</p>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="bg-white p-6 rounded-2xl shadow-sm md:col-span-1">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Add Transaction</h2>
            <form id="tx-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Description</label>
                    <input type="text" id="tx-desc" required placeholder="e.g., Groceries, Salary" class="w-full mt-1 p-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Amount (₹)</label>
                    <input type="number" id="tx-amount" required placeholder="0.00" class="w-full mt-1 p-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Type</label>
                    <select id="tx-type" class="w-full mt-1 p-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="expense">📉 Expense</option>
                        <option value="income">📈 Income</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold p-3 rounded-xl transition shadow-md">
                    Save Transaction
                </button>
            </form>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm md:col-span-2 flex flex-col justify-between">
            <h2 class="text-lg font-bold text-gray-800 mb-2">Financial Breakdown</h2>
            <div class="w-full max-h-64 flex justify-center">
                <canvas id="financeChart"></canvas>
            </div>
            <div class="flex justify-around text-center mt-4 pt-4 border-t">
                <div>
                    <p class="text-xs text-gray-400 uppercase">Total Income</p>
                    <p id="total-income" class="text-xl font-bold text-green-600">₹0</p>
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase">Total Expenses</p>
                    <p id="total-expense" class="text-xl font-bold text-red-500">₹0</p>
                </div>
            </div>
        </section>
    </div>

    <section class="bg-white p-6 rounded-2xl shadow-sm mt-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Transaction History</h2>
        <div class="overflow-x-auto">
            <ul id="tx-history" class="divide-y divide-gray-100 max-h-60 overflow-y-auto">
                <p class="text-sm text-gray-400 text-center py-4">No logged transactions yet.</p>
            </ul>
        </div>
    </section>

    <script>
        // Local Storage State Engine
        let transactions = JSON.parse(localStorage.getItem('wt_transactions')) || [];

        // UI Core DOM Elements
        const form = document.getElementById('tx-form');
        const descInput = document.getElementById('tx-desc');
        const amountInput = document.getElementById('tx-amount');
        const typeInput = document.getElementById('tx-type');
        const historyList = document.getElementById('tx-history');
        const balanceDisplay = document.getElementById('total-balance');
        const incomeDisplay = document.getElementById('total-income');
        const expenseDisplay = document.getElementById('total-expense');

        // Analytics Chart Setup Instance
        const ctx = document.getElementById('financeChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Income', 'Expenses'],
                datasets: [{
                    data: [0, 0],
                    backgroundColor: ['#10b981', '#f43f5e'],
                    borderWidth: 2
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // App Renderer Refresh Logic
        function updateUI() {
            historyList.innerHTML = '';
            let income = 0, expense = 0;

            if (transactions.length === 0) {
                historyList.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">No logged transactions yet.</p>';
            }

            transactions.forEach((tx, idx) => {
                const isIncome = tx.type === 'income';
                if (isIncome) income += tx.amount;
                else expense += tx.amount;

                const li = document.createElement('li');
                li.className = "flex justify-between items-center py-3 text-sm";
                li.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="p-2 rounded-full ${isIncome ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${isIncome ? '📈' : '📉'}
                        </span>
                        <span class="font-medium text-gray-700">${tx.desc}</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="font-semibold ${isIncome ? 'text-green-600' : 'text-red-500'}">
                            ${isIncome ? '+' : '-'} ₹${tx.amount.toLocaleString('en-IN')}
                        </span>
                        <button onclick="deleteTx(${idx})" class="text-gray-300 hover:text-red-500 transition">✕</button>
                    </div>
                `;
                historyList.appendChild(li);
            });

            const netWorth = income - expense;
            balanceDisplay.innerText = `₹${netWorth.toLocaleString('en-IN')}`;
            incomeDisplay.innerText = `₹${income.toLocaleString('en-IN')}`;
            expenseDisplay.innerText = `₹${expense.toLocaleString('en-IN')}`;

            // Sync visual chart
            chart.data.datasets[0].data = [income, expense];
            chart.update();

            localStorage.setItem('wt_transactions', JSON.stringify(transactions));
        }

        // Action Handlers
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            transactions.unshift({
                desc: descInput.value,
                amount: parseFloat(amountInput.value),
                type: typeInput.value
            });
            descInput.value = '';
            amountInput.value = '';
            updateUI();
        });

        window.deleteTx = function(idx) {
            transactions.splice(idx, 1);
            updateUI();
        };

        // Initialize App View
        updateUI();

        // Register Service Worker for PWA compliance
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Active!', reg.scope))
                    .catch(err => console.error('Service Worker Fault:', err));
            });
        }
    </script>
</body>
</html>
